<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to dashboard</title>
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://ekurer.github.io/arab-society-murder-tracker/dashboard/" />
    <meta http-equiv="refresh" content="0; url=./dashboard/" />
    <script>
      const supportedLanguages = new Set(["he", "ar", "en"]);

      function detectLanguage(searchParams) {
        const explicitLanguage = searchParams.get("lang");
        if (supportedLanguages.has(explicitLanguage)) {
          return explicitLanguage;
        }

        const browserLanguages = [...(navigator.languages || []), navigator.language]
          .filter(Boolean)
          .map((language) => language.toLowerCase());

        for (const language of browserLanguages) {
          if (language.startsWith("he")) {
            return "he";
          }

          if (language.startsWith("ar")) {
            return "ar";
          }

          if (language.startsWith("en")) {
            return "en";
          }
        }

        return "he";
      }

      const currentUrl = new URL(window.location.href);
      const targetUrl = new URL("./dashboard/", currentUrl);

      currentUrl.searchParams.forEach((value, key) => {
        targetUrl.searchParams.append(key, value);
      });

      if (!supportedLanguages.has(targetUrl.searchParams.get("lang"))) {
        targetUrl.searchParams.set("lang", detectLanguage(currentUrl.searchParams));
      }

      targetUrl.hash = currentUrl.hash;

      window.location.replace(targetUrl.toString());
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f3eee5;
        color: #172033;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to the dashboard. <a id="redirect-link" href="./dashboard/">Continue</a></p>
    <script>
      document.getElementById("redirect-link").href = targetUrl.toString();
    </script>
  </body>
</html>
